name: Build ScreenMirror

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Позволяет запускать вручную из вкладки Actions
  workflow_dispatch:

jobs:

  # ── Android TV APK ─────────────────────────────────────────────────────────
  build-android:
    name: Android TV APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Устанавливает Gradle 8.4 и добавляет в PATH как `gradle`
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      # Генерируем gradlew wrapper прямо в CI (не нужно коммитить JAR)
      - name: Generate Gradle wrapper
        working-directory: android-tv
        run: gradle wrapper --gradle-version=8.4

      - name: Make gradlew executable
        working-directory: android-tv
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: android-tv
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: screenmirror-tv-debug
          # Имя файла будет screenmirror-tv-debug.apk
          path: android-tv/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  # ── Windows Electron installer ─────────────────────────────────────────────
  build-windows:
    name: Windows Installer (.exe)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: windows-client/package-lock.json

      - name: Install dependencies
        working-directory: windows-client
        run: npm ci

      - name: Build Electron installer
        working-directory: windows-client
        run: npm run build
        env:
          # Отключает авто-публикацию в GitHub Releases (мы используем artifact)
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: screenmirror-windows-installer
          path: |
            windows-client/dist/*.exe
            windows-client/dist/*.yml
          retention-days: 30

  # ── Создать GitHub Release при теге vX.Y.Z ─────────────────────────────────
  release:
    name: Create Release
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    # Запускается только при пуше тега вида v1.0.0
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: screenmirror-tv-debug
          path: artifacts/android

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: screenmirror-windows-installer
          path: artifacts/windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/android/app-debug.apk
            artifacts/windows/*.exe
          body: |
            ## ScreenMirror ${{ github.ref_name }}

            ### Установка

            **На ноутбуке (Windows):**
            Скачай и запусти `ScreenMirror Setup *.exe`

            **На Android TV:**
            1. Включи Developer Options → ADB via Network
            2. `adb connect <IP_телевизора>:5555`
            3. `adb install app-debug.apk`
