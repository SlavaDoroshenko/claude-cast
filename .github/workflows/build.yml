name: Build ScreenMirror

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:

  # ── Android TV APK ─────────────────────────────────────────────────────────
  build-android:
    name: Android TV APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Generate Gradle wrapper
        working-directory: android-tv
        run: gradle wrapper --gradle-version=8.4

      - name: Make gradlew executable
        working-directory: android-tv
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: android-tv
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: screenmirror-tv-debug
          path: android-tv/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  # ── Релиз APK — только Android, не ждёт Windows ────────────────────────────
  release-apk:
    name: Publish APK Release
    needs: build-android
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    permissions:
      contents: write

    steps:
      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: screenmirror-tv-debug
          path: artifacts/android

      - name: Create or update "latest" Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest build"
          prerelease: true
          make_latest: true
          files: artifacts/android/app-debug.apk
          body: |
            ## ScreenMirror TV — последняя сборка

            ### Установка через Downloader (Aptoide)
            Введи этот URL в приложении Downloader:
            ```
            https://github.com/SlavaDoroshenko/claude-cast/releases/latest/download/app-debug.apk
            ```

            ### Установка через USB флешку
            1. Скачай `app-debug.apk` ниже
            2. Скопируй на USB (FAT32)
            3. TV: Настройки → Приложения → Неизвестные источники → ВКЛ
            4. Открой файловый менеджер → установи APK

  # ── Windows Electron installer (независимо от APK релиза) ──────────────────
  build-windows:
    name: Windows Installer (.exe)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: windows-client/package-lock.json

      - name: Install dependencies
        working-directory: windows-client
        run: npm ci

      - name: Build Electron installer
        working-directory: windows-client
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: screenmirror-windows-installer
          path: |
            windows-client/dist/*.exe
            windows-client/dist/*.yml
          retention-days: 30
