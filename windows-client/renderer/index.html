<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScreenMirror</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">

    <!-- ── Header ─────────────────────────────────────────────────── -->
    <header class="header">
      <div class="header-brand">
        <svg class="brand-icon" width="26" height="26" viewBox="0 0 24 24" fill="none">
          <rect x="2" y="3" width="20" height="14" rx="2.5"
                stroke="#7c6fff" stroke-width="2" fill="none"/>
          <path d="M8 21h8M12 17v4"
                stroke="#7c6fff" stroke-width="2" stroke-linecap="round"/>
          <path d="M7 10.5l3 3 5-5"
                stroke="#00d4aa" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="brand-name">ScreenMirror</span>
      </div>

      <div class="status-pill" id="status-pill">
        <span class="status-dot" id="status-dot"></span>
        <span class="status-label" id="status-text">Starting…</span>
      </div>
    </header>

    <!-- ── Body ───────────────────────────────────────────────────── -->
    <main class="body">

      <!-- Left column -->
      <div class="col-left">

        <!-- Connection card -->
        <div class="card">
          <div class="card-head">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="3" fill="#7c6fff"/>
              <path d="M6.3 6.3a8 8 0 000 11.4M17.7 6.3a8 8 0 010 11.4"
                    stroke="#7c6fff" stroke-width="2" stroke-linecap="round"/>
              <path d="M3.5 3.5a14 14 0 000 17M20.5 3.5a14 14 0 010 17"
                    stroke="#7c6fff" stroke-width="1.5" stroke-linecap="round" opacity=".45"/>
            </svg>
            <span>Connection Info</span>
          </div>

          <div class="conn-grid">
            <div class="conn-item">
              <span class="conn-lbl">IP Address</span>
              <span class="conn-val mono" id="local-ip">—</span>
            </div>
            <div class="conn-item">
              <span class="conn-lbl">PIN Code</span>
              <div class="pin-box" id="pin-code">····</div>
            </div>
          </div>
          <p class="conn-hint">Open ScreenMirror on your TV and enter this PIN</p>
        </div>

        <!-- Preview card -->
        <div class="card card-preview">
          <div class="card-head">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
              <rect x="2" y="3" width="20" height="14" rx="2"
                    stroke="#7c6fff" stroke-width="2" fill="none"/>
              <path d="M8 21h8M12 17v4"
                    stroke="#7c6fff" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <span>Screen Preview</span>
          </div>
          <div class="preview-wrap">
            <img id="source-preview" class="preview-img" alt="" />
            <div class="preview-empty" id="preview-empty">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="none" opacity=".3">
                <rect x="2" y="3" width="20" height="14" rx="2"
                      stroke="#888" stroke-width="1.5" fill="none"/>
                <path d="M8 21h8M12 17v4"
                      stroke="#888" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
              <span>No preview</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Right column -->
      <div class="col-right">

        <!-- Settings card -->
        <div class="card">
          <div class="card-head">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="3" stroke="#7c6fff" stroke-width="2" fill="none"/>
              <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"
                    stroke="#7c6fff" stroke-width="1.5" fill="none"/>
            </svg>
            <span>Stream Settings</span>
          </div>

          <div class="field">
            <label class="field-lbl" for="source-select">Screen Source</label>
            <select class="select" id="source-select">
              <option value="">Loading…</option>
            </select>
          </div>

          <div class="field-row">
            <div class="field">
              <label class="field-lbl" for="quality-select">Resolution</label>
              <select class="select" id="quality-select">
                <option value="1080p" selected>1080p</option>
                <option value="720p">720p</option>
                <option value="source">Native</option>
              </select>
            </div>
            <div class="field">
              <label class="field-lbl" for="fps-select">Frame Rate</label>
              <select class="select" id="fps-select">
                <option value="30" selected>30 fps</option>
                <option value="60">60 fps</option>
                <option value="24">24 fps</option>
              </select>
            </div>
          </div>
        </div>

        <!-- Device card -->
        <div class="card">
          <div class="card-head">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
              <rect x="5" y="2" width="14" height="20" rx="2"
                    stroke="#7c6fff" stroke-width="2" fill="none"/>
              <circle cx="12" cy="17.5" r="1" fill="#7c6fff"/>
            </svg>
            <span>Connected Device</span>
          </div>
          <div class="device-row">
            <div class="device-icon">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
                <rect x="2" y="7" width="20" height="15" rx="2"
                      stroke="#7c6fff" stroke-width="1.5" fill="none"/>
                <path d="M17 7V5a2 2 0 00-2-2H9a2 2 0 00-2 2v2"
                      stroke="#7c6fff" stroke-width="1.5"/>
                <circle cx="12" cy="14.5" r="1.5" fill="#7c6fff"/>
              </svg>
            </div>
            <span class="device-name" id="connected-device">No device connected</span>
          </div>
        </div>

        <!-- Controls -->
        <div class="card controls-card">
          <button class="btn btn-start" id="start-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <polygon points="5,3 19,12 5,21" fill="currentColor"/>
            </svg>
            Start Streaming
          </button>
          <button class="btn btn-stop hidden" id="stop-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <rect x="4" y="4" width="16" height="16" rx="2" fill="currentColor"/>
            </svg>
            Stop Streaming
          </button>
        </div>

        <!-- Live stats (shown only while connected) -->
        <div class="card stats-card hidden" id="stats-card">
          <div class="card-head">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
              <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"
                        stroke="#00d4aa" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            </svg>
            <span>Live Stats</span>
          </div>
          <div class="stats-grid">
            <div class="stat">
              <span class="stat-lbl">Resolution</span>
              <span class="stat-val" id="stat-resolution">—</span>
            </div>
            <div class="stat">
              <span class="stat-lbl">Frame Rate</span>
              <span class="stat-val" id="stat-fps">—</span>
            </div>
            <div class="stat">
              <span class="stat-lbl">Connection</span>
              <span class="stat-val" id="stat-connection">—</span>
            </div>
            <div class="stat">
              <span class="stat-lbl">Bitrate</span>
              <span class="stat-val" id="stat-bitrate">—</span>
            </div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
